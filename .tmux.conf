# ~/.tmux.conf — tmux 3.x (tested with 3.6)

# Shell (login shell may be zsh while tmux still spawns bash without this)
set -g default-shell /usr/bin/zsh

# Terminal
set -g default-terminal "tmux-256color"
set -as terminal-overrides ',*:Tc'
set -g focus-events on
set -sg escape-time 0

# Prefix: Ctrl+\ (Ctrl+b is default; we unbind it)
set -g prefix 'C-\'
unbind C-b
bind-key 'C-\' send-prefix

set -g allow-rename off
set -g mouse on
set -g set-clipboard on
set -g history-limit 50000

# Window/pane index from 1 (optional; comment out if you prefer 0)
set -g base-index 1
setw -g pane-base-index 1

# Vi-style copy mode (scrollback / search)
setw -g mode-keys vi

# Enter copy mode: F9 (no prefix), [ or PgUp (prefix not required for F9/PgUp)
unbind-key -n F9
bind-key -T root F9 copy-mode
bind-key -T root PPage copy-mode -u
bind-key [ copy-mode

# Vi copy-mode keys (v select, y yank, q/Esc quit, / search, hjkl move)
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -in -selection clipboard 2>/dev/null || wl-copy -i 2>/dev/null || tmux show-buffer"
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "xclip -in -selection clipboard 2>/dev/null || wl-copy -i 2>/dev/null || tmux show-buffer"
bind-key -T copy-mode-vi Escape send-keys -X cancel
bind-key -T copy-mode-vi q send-keys -X cancel
bind-key -T copy-mode-vi F9 send-keys -X cancel

# Mouse: do not copy+exit on release (default MouseDragEnd1Pane uses copy-pipe-and-cancel)
unbind-key -T copy-mode-vi MouseDragEnd1Pane
unbind-key -T copy-mode MouseDragEnd1Pane
# Selection stays highlighted; press y to copy to clipboard, q to quit

# Windows
bind-key -n M-k next-window
bind-key -n M-j previous-window

# Panes (with prefix)
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

bind-key -n C-f resize-pane -Z
bind-key r source-file ~/.tmux.conf \; display-message "Reloaded ~/.tmux.conf"

# Splits (with prefix)
unbind-key s
unbind-key v
bind-key o split-window -v
bind-key e split-window -h
bind-key S split-window -v \; resize-pane -D 25
bind-key V split-window -v \; resize-pane -D 25 \; send-keys 'vim' C-m
bind-key X kill-pane

# vim-tmux-navigator: Ctrl+hjkl (matches ~/.vimrc TmuxNavigate*)
# When vim/nvim/fzf has focus, pass keys through; otherwise switch panes.
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +expect(yes)? +g?(view|n?vim?x?|fzf)(diff)?$'"
bind-key -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind-key -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind-key -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind-key -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"

# Status bar
set -g status-keys emacs
set -g status-bg colour234
set -g status-fg colour15
set -g status-right-length 80
set -g status-right '#[fg=brightgreen]%a %H:%M #[fg=colour7]| #[fg=brightred]#(cut -d" " -f1-3 /proc/loadavg 2>/dev/null)'

setw -g window-status-format '#[fg=magenta]#[bg=black] #I #[bg=cyan]#[fg=colour8] #W '
setw -g window-status-current-format '#[bg=brightmagenta]#[fg=colour8] #I #[fg=colour8]#[bg=colour14] #W '

# Legacy terminals (xterm-style modifier keys)
set -g xterm-keys on
